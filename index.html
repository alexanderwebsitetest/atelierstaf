<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atelier Staf – Bevel, Belgium</title>

  <!-- Artistic fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background-color: #ffffff;
      color: #222;
      overflow-x: hidden;
    }

    /* Fixed header */
    header {
      width: 100%;
      height: 70px;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    /* Contact tab on the left */
    .contact-tab {
      position: absolute;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      color: #222;
      text-decoration: none;
      letter-spacing: 0.5px;
    }

    /* Contact info dropdown */
    #contact-info {
      display: none;
      position: absolute;
      left: 40px;
      top: 70px;
      background: rgba(255,255,255,0.95);
      padding: 12px 20px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      font-size: 18px;
      z-index: 999;
    }

    .logo {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      color: #222;
      letter-spacing: 1px;
    }

    /* Hero section */
    .hero {
      height: 100vh;
      width: 100%;
      background-image: url('https://copilot.microsoft.com/shares/9RiPh9QuEw2aMLiXNRAJk');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }

    .coming-soon {
      font-size: 48px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>

  <header>
    <a class="contact-tab" onclick="toggleContact()">Contact</a>
    <div class="logo">Atelier Staf</div>
    <div id="contact-info">evi_vandenbulck@hotmail.com</div>
  </header>

  <div class="hero">
    <div class="coming-soon">Coming soon</div>
  </div>

  <script>
    function toggleContact() {
      const info = document.getElementById("contact-info");
      info.style.display = info.style.display === "block" ? "none" : "block";
    }
  </script>

</body>
</html>
